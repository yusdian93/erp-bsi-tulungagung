<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#073B32">
    <title>Cek Saldo Tabungan Sampah | Tulungagung</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="supabase-adapter.js" defer></script>

    
    <style>
        :root {
            --green-950:#041F1A;
            --green-900:#073B32;
            --green-700:#0B7156;
            --green-600:#0E8A67;
            --gold:#C99A3D;
            --gold-soft:#F3E2B9;
            --ink:#071A17;
            --muted:#677C76;
            --line:#DCE7E2;
        }
        * { box-sizing:border-box; }
        body {
            min-height:100vh;
            margin:0;
            padding:24px 16px 38px;
            font-family:'Plus Jakarta Sans',sans-serif;
            color:var(--ink);
            background:
                radial-gradient(circle at 5% 0%,rgba(201,154,61,.20),transparent 22rem),
                radial-gradient(circle at 95% 15%,rgba(14,138,103,.17),transparent 25rem),
                linear-gradient(145deg,#F8FAF8,#E9F0EC);
        }
        body::before {
            content:"";
            position:fixed;
            inset:0;
            z-index:-1;
            opacity:.32;
            background-image:
                linear-gradient(rgba(7,59,50,.03) 1px,transparent 1px),
                linear-gradient(90deg,rgba(7,59,50,.03) 1px,transparent 1px);
            background-size:32px 32px;
            mask-image:linear-gradient(to bottom,black,transparent 78%);
        }
        .wrap { max-width:520px;margin:0 auto; }
        .brand-header {
            position:relative;
            overflow:hidden;
            margin-bottom:18px;
            padding:22px;
            display:flex;
            align-items:center;
            gap:16px;
            border-radius:25px;
            color:#fff;
            text-align:left;
            background:
                radial-gradient(circle at 92% 5%,rgba(226,190,113,.26),transparent 10rem),
                linear-gradient(135deg,#041F1A,#084A3C);
            border:1px solid rgba(255,255,255,.13);
            box-shadow:0 22px 55px rgba(4,40,32,.22);
        }
        .brand-header::after {
            content:"";
            position:absolute;
            left:0;right:0;top:0;height:2px;
            background:linear-gradient(90deg,transparent,#E7C77E,transparent);
        }
        .logo-shell {
            width:76px;height:76px;
            flex:0 0 76px;
            display:grid;place-items:center;
            border-radius:20px;
            background:linear-gradient(145deg,#fff,#EAF2EE);
            box-shadow:0 12px 25px rgba(0,0,0,.20),inset 0 1px #fff;
        }
        .logo-shell img { width:68px;height:68px;object-fit:contain; }
        .brand-kicker {
            color:var(--gold-soft);
            font-size:.65rem;
            font-weight:800;
            letter-spacing:1.5px;
            text-transform:uppercase;
        }
        .brand-title {
            margin:4px 0 5px;
            font-size:1.02rem;
            font-weight:800;
            letter-spacing:-.25px;
        }
        .brand-subtitle {
            color:rgba(255,255,255,.63);
            font-size:.69rem;
            font-weight:600;
            line-height:1.45;
        }

        .card-utama {
            position:relative;
            overflow:hidden;
            margin-bottom:18px;
            padding:28px 25px;
            border-radius:24px;
            background:rgba(255,255,255,.94);
            border:1px solid rgba(7,59,50,.10);
            box-shadow:0 18px 45px rgba(4,40,32,.11);
            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);
            animation:fadeUp .35s ease;
        }
        .card-utama::before {
            content:"";
            position:absolute;
            left:24px;right:24px;top:0;height:2px;
            background:linear-gradient(90deg,transparent,rgba(201,154,61,.75),transparent);
        }
        @keyframes fadeUp {
            from{opacity:0;transform:translateY(7px)}
            to{opacity:1;transform:translateY(0)}
        }
        .form-control {
            min-height:52px;
            border-radius:14px;
            padding:13px 16px;
            color:var(--ink);
            background:#FBFCFB;
            border:1px solid var(--line);
            font-weight:600;
            box-shadow:none;
        }
        .form-control:hover { border-color:#BCCFC7; }
        .form-control:focus {
            border-color:var(--green-600);
            box-shadow:0 0 0 4px rgba(14,138,103,.10);
            background:#fff;
        }
        .btn-utama {
            min-height:52px;
            width:100%;
            padding:14px 18px;
            border:0;
            border-radius:14px;
            color:#fff;
            font-weight:800;
            letter-spacing:.35px;
            background:linear-gradient(135deg,#0E8A67,#075542);
            box-shadow:0 11px 24px rgba(7,85,66,.23);
            transition:.25s;
        }
        .btn-utama:hover:not(:disabled) {
            transform:translateY(-2px);
            box-shadow:0 15px 30px rgba(7,85,66,.30);
        }
        .btn-utama:disabled { opacity:.58; }
        .kartu-saldo {
            position:relative;
            overflow:hidden;
            margin-bottom:20px;
            padding:26px 22px;
            border-radius:21px;
            color:#fff;
            text-align:left;
            background:
                radial-gradient(circle at 95% 0%,rgba(231,199,126,.25),transparent 10rem),
                linear-gradient(135deg,#063B31,#0A765A);
            border:1px solid rgba(255,255,255,.14);
            box-shadow:0 18px 38px rgba(4,56,44,.24);
        }
        .kartu-saldo::before {
            content:"";
            position:absolute;
            width:140px;height:140px;
            right:-55px;top:-70px;
            border-radius:50%;
            border:1px solid rgba(255,255,255,.12);
            box-shadow:0 0 0 28px rgba(255,255,255,.025);
        }
        .saldo-besar {
            color:#fff;
            font-size:clamp(2rem,8vw,2.75rem);
            font-weight:800;
            letter-spacing:-1.5px;
            line-height:1.12;
        }
        .riwayat-item {
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:14px;
            padding:13px 0;
            border-bottom:1px solid #E9EFEC;
            font-size:13.5px;
        }
        .riwayat-item:last-child { border-bottom:0; }
        .badge-jenis,.badge-tarik {
            display:inline-flex;
            align-items:center;
            padding:4px 9px;
            border-radius:999px;
            font-size:10px;
            font-weight:800;
            letter-spacing:.45px;
        }
        .badge-jenis { background:#E4F5EE;color:#075542;border:1px solid #C2E6D7; }
        .badge-tarik { background:#FDECEC;color:#9C2424;border:1px solid #F5CCCC; }
        .pilih-nasabah-btn {
            width:100%;
            margin-bottom:10px;
            padding:14px 15px;
            border-radius:14px;
            border:1px solid var(--line);
            color:var(--ink);
            background:#FBFCFB;
            font-weight:800;
            text-align:left;
            transition:.22s;
        }
        .pilih-nasabah-btn:hover {
            transform:translateY(-1px);
            border-color:#A7C8BB;
            background:#F0F8F4;
        }
        .txt-muted { color:var(--muted);font-size:12.5px; }
        .error-box {
            margin-top:13px;
            padding:12px 14px;
            border-radius:13px;
            color:#8F2525;
            background:#FFF2F2;
            border:1px solid #F4CACA;
            font-size:13px;
            line-height:1.5;
        }
        .privacy-note {
            display:flex;
            align-items:flex-start;
            gap:9px;
            margin-top:12px;
            padding:11px 12px;
            border-radius:12px;
            color:#63766F;
            background:#F5F8F6;
            border:1px solid #E5ECE8;
            font-size:11.5px;
            line-height:1.5;
        }
        .privacy-note i { color:var(--green-700);margin-top:1px; }
        .footer-copy {
            color:#758781;
            font-size:11.5px;
            font-weight:600;
            text-align:center;
        }
        :focus-visible { outline:3px solid rgba(201,154,61,.55);outline-offset:2px; }
        @media(max-width:480px){
            body{padding:12px 11px 28px;}
            .brand-header{padding:18px;border-radius:20px;}
            .logo-shell{width:62px;height:62px;flex-basis:62px;border-radius:17px;}
            .logo-shell img{width:56px;height:56px;}
            .brand-title{font-size:.91rem;}
            .card-utama{padding:23px 19px;border-radius:20px;}
        }
    </style>
</head>
<body>
<div class="wrap">

    <header class="brand-header">
        <div class="logo-shell">
            <img src="logo_dlh.png" alt="Logo DLH Tulungagung" onerror="this.style.display='none';">
        </div>
        <div>
            <div class="brand-kicker">Layanan Mandiri</div>
            <div class="brand-title">CEK SALDO TABUNGAN SAMPAH</div>
            <div class="brand-subtitle">Bank Sampah Kabupaten Tulungagung</div>
        </div>
    </header>

    <div id="areaUtama"></div>

    <p class="footer-copy" style="margin-top:12px;">
        &copy; 2026 Dinas Lingkungan Hidup Kabupaten Tulungagung
    </p>
</div>

<script>
    // ================== STATE & UTIL ==================
    const params = new URLSearchParams(window.location.search);
    let idUnitAktif = params.get('unit') || '';
    let idNasabahAktif = params.get('nasabah') || '';
    let hasilPencarianSaatIni = null; // dipakai saat ada >1 nasabah cocok (HP sama)

    function rp(v) { return 'Rp ' + Math.round(v || 0).toLocaleString('id-ID'); }
    function formatTgl(t) {
        let d = new Date(t);
        if (isNaN(d.getTime())) return t;
        return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function samarkanNama(nama) {
        if (!nama) return '-';
        return nama.split(' ').map(kata => kata.length <= 2 ? kata : kata.slice(0, 2) + '*'.repeat(Math.max(1, kata.length - 2))).join(' ');
    }
    function tampilkan(html) { document.getElementById('areaUtama').innerHTML = html; }
    function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ================== LAYAR: MEMUAT ==================
    function layarMemuat(pesan) {
        tampilkan(`<div class="card-utama text-center"><div class="spinner-border text-primary mb-2"></div><p class="txt-muted mb-0">${pesan || 'Memuat...'}</p></div>`);
    }

    // ================== LAYAR: FORM CEK SALDO (mode Unit / mode Personal) ==================
    async function tampilkanFormCek() {
        if (!idUnitAktif) return tampilkanModeManual();

        layarMemuat('Memuat info Bank Sampah Unit...');
        let unit = await AdapterAPI.getInfoUnitPublik(idUnitAktif);
        if (!unit) {
            tampilkan(`<div class="card-utama"><div class="error-box">Bank Sampah Unit tidak ditemukan. Coba scan ulang QR-nya, atau hubungi petugas unit Anda.</div>
                <button class="btn btn-link mt-2 p-0" onclick="tampilkanModeManual()">Pilih unit secara manual</button></div>`);
            return;
        }

        let infoNasabah = null;
        if (idNasabahAktif) {
            infoNasabah = await AdapterAPI.getInfoNasabahRingkas(idUnitAktif, idNasabahAktif);
        }

        let judulKonteks = infoNasabah
            ? `Halo, <b>${esc(samarkanNama(infoNasabah.nama))}</b>!<br><span class="txt-muted">Bank Sampah Unit: ${esc(unit.nama)}</span>`
            : `<span class="txt-muted">Bank Sampah Unit</span><br><b style="font-size:1.15rem;">${esc(unit.nama)}</b>`;

        tampilkan(`
            <div class="card-utama">
                <p style="line-height:1.5;">${judulKonteks}</p>
                <p class="txt-muted" style="margin-bottom:14px;">
                    Masukkan nomor HP Anda yang terdaftar di Bank Sampah Unit ini untuk melihat saldo &amp; rincian tabungan sampah.
                </p>
                <div class="mb-3">
                    <input type="tel" id="inputHp" class="form-control" placeholder="Contoh: 081234567890" inputmode="numeric">
                </div>
                <button class="btn-utama" id="btnCek" onclick="prosesCekSaldo()"><i class="bi bi-search me-2"></i>CEK SALDO SAYA</button>
                <div class="privacy-note"><i class="bi bi-shield-lock-fill"></i><span>Nomor HP digunakan hanya untuk verifikasi data tabungan pada unit yang dipilih.</span></div>
                <div id="areaError"></div>
                ${!idNasabahAktif ? '' : `<button class="btn btn-link txt-muted mt-2 p-0" onclick="idNasabahAktif=''; idUnitAktif='${esc(idUnitAktif)}'; tampilkanFormCek();">Bukan Anda? Cek dengan cara lain</button>`}
            </div>
        `);
        document.getElementById('inputHp').addEventListener('keydown', (e) => { if (e.key === 'Enter') prosesCekSaldo(); });
        document.getElementById('inputHp').focus();
    }

    // ================== LAYAR: MODE MANUAL (tanpa parameter URL sama sekali) ==================
    async function tampilkanModeManual() {
        layarMemuat('Memuat daftar Bank Sampah Unit...');
        let daftar = await AdapterAPI.getDaftarUnitPublik();
        let opsi = daftar.map(u => `<option value="${esc(u.id)}">${esc(u.nama)}</option>`).join('');
        tampilkan(`
            <div class="card-utama">
                <p class="mb-2"><i class="bi bi-qr-code-scan"></i> Biasanya halaman ini dibuka lewat scan QR yang dipasang di lokasi Bank Sampah Unit.
                Kalau Anda membuka langsung tanpa scan, silakan pilih unit Anda secara manual:</p>
                <div class="mb-3">
                    <label class="txt-muted mb-1 d-block">Bank Sampah Unit</label>
                    <select id="pilihUnitManual" class="form-control">
                        <option value="">-- Pilih Bank Sampah Unit --</option>
                        ${opsi}
                    </select>
                </div>
                <div class="mb-3">
                    <input type="tel" id="inputHpManual" class="form-control" placeholder="Nomor HP terdaftar" inputmode="numeric">
                </div>
                <button class="btn-utama" onclick="prosesCekSaldoManual()"><i class="bi bi-search me-2"></i>CEK SALDO SAYA</button>
                <div class="privacy-note"><i class="bi bi-shield-lock-fill"></i><span>Nomor HP digunakan hanya untuk verifikasi data tabungan pada unit yang dipilih.</span></div>
                <div id="areaError"></div>
            </div>
        `);
    }

    function prosesCekSaldoManual() {
        let unit = document.getElementById('pilihUnitManual').value;
        let hp = document.getElementById('inputHpManual').value;
        if (!unit) return tampilkanError('Pilih Bank Sampah Unit terlebih dahulu.');
        idUnitAktif = unit;
        jalankanPencarian(hp);
    }

    function prosesCekSaldo() {
        let hp = document.getElementById('inputHp').value;
        jalankanPencarian(hp);
    }

    function tampilkanError(pesan) {
        let el = document.getElementById('areaError');
        if (el) el.innerHTML = `<div class="error-box">${esc(pesan)}</div>`;
    }

    // ================== PROSES PENCARIAN ==================
    async function jalankanPencarian(nomorHp) {
        nomorHp = (nomorHp || '').trim();
        if (!nomorHp) return tampilkanError('Nomor HP wajib diisi.');

        let btn = document.getElementById('btnCek');
        if (btn) { btn.disabled = true; btn.innerText = 'Mencari...'; }

        try {
            let res = await AdapterAPI.cekSaldoNasabahPublik({ idUnit: idUnitAktif, nomorHp: nomorHp, idNasabah: idNasabahAktif || null });
            if (!res.ok) { tampilkanError(res.error); return; }

            hasilPencarianSaatIni = res;
            if (res.data.length === 1) {
                tampilkanHasil(res.unit, res.data[0]);
            } else {
                tampilkanPilihNasabah(res.unit, res.data);
            }
        } catch (e) {
            tampilkanError('Terjadi kesalahan: ' + e);
        } finally {
            if (btn) { btn.disabled = false; btn.innerText = 'CEK SALDO SAYA'; }
        }
    }

    // Kalau satu nomor HP terdaftar untuk lebih dari satu nasabah (mis. satu keluarga)
    function tampilkanPilihNasabah(unit, daftar) {
        let opsi = daftar.map((d, i) => `<button class="pilih-nasabah-btn" onclick="tampilkanHasilDariIndex(${i})">👤 ${esc(samarkanNama(d.nasabah.nama))}</button>`).join('');
        tampilkan(`
            <div class="card-utama">
                <p class="mb-3">Nomor HP ini terdaftar untuk <b>${daftar.length} nasabah</b> di ${esc(unit ? unit.nama : '')}. Pilih nama Anda:</p>
                ${opsi}
                <button class="btn btn-link txt-muted mt-1 p-0" onclick="tampilkanFormCek()">← Kembali</button>
            </div>
        `);
    }
    // ================== KELUAR (setelah selesai cek saldo) ==================
    // Membersihkan seluruh data saldo/riwayat dari layar (demi privasi, terutama
    // kalau halaman ini dibuka di HP yang dipakai bergantian), lalu mencoba
    // menutup tab. window.close() cuma berhasil kalau tab ini dibuka lewat
    // script (mis. dari menu Bagikan/scan QR di sebagian browser) -- browser
    // modern sengaja tidak izinkan menutup tab hasil navigasi biasa. Kalau
    // gagal ditutup, tampilkan layar "selesai" yang bersih tanpa data pribadi.
    function keluarDariAplikasi() {
        idNasabahAktif = ''; idUnitAktif = params.get('unit') || ''; hasilPencarianSaatIni = null;

        window.close();

        setTimeout(() => {
            tampilkan(`
                <div class="card-utama text-center">
                    <div style="font-size:42px; margin-bottom:8px;">✅</div>
                    <h5 style="font-weight:800; margin-bottom:6px;">Selesai</h5>
                    <p class="txt-muted mb-1">Terima kasih sudah menggunakan layanan Cek Saldo Mandiri.</p>
                    <p class="txt-muted" style="font-size:12px;">Anda bisa menutup tab/jendela ini sekarang.</p>
                </div>
            `);
        }, 150);
    }

    function tampilkanHasilDariIndex(i) {
        tampilkanHasil(hasilPencarianSaatIni.unit, hasilPencarianSaatIni.data[i]);
    }

    // ================== LAYAR: HASIL SALDO ==================
    function tampilkanHasil(unit, d) {
        let riwayatHtml = d.riwayat.length
            ? d.riwayat.map(t => {
                let nilai = parseFloat(t.total) || 0;
                let tarik = nilai < 0;
                return `<div class="riwayat-item">
                    <div>
                        <div>${tarik ? '<span class="badge-tarik">PENARIKAN</span>' : `<span class="badge-jenis">${esc(t.jenis || 'Setoran')}</span>`}</div>
                        <div class="txt-muted" style="margin-top:3px;">${formatTgl(t.tgl)} ${!tarik && t.berat ? '· ' + parseFloat(t.berat).toLocaleString('id-ID') + ' Kg' : ''}</div>
                    </div>
                    <div style="font-weight:800; color:${tarik ? '#991b1b' : '#166534'};">${tarik ? '-' : '+'}${rp(Math.abs(nilai))}</div>
                </div>`;
            }).join('')
            : '<p class="txt-muted text-center py-3 mb-0">Belum ada riwayat transaksi.</p>';

        tampilkan(`
            <div class="card-utama">
                <p class="txt-muted mb-1">${esc(unit ? unit.nama : '')}</p>
                <h5 style="font-weight:800; margin-bottom:16px;">👤 ${esc(d.nasabah.nama)}</h5>

                <div class="kartu-saldo">
                    <div style="font-size:12.5px; opacity:0.9; margin-bottom:4px;">SALDO TABUNGAN SAAT INI</div>
                    <div class="saldo-besar">${rp(d.saldo)}</div>
                    <div style="font-size:12px; opacity:0.9; margin-top:6px;">Total sampah tertabung: ${(d.totalBeratSetor || 0).toLocaleString('id-ID')} Kg</div>
                </div>

                <h6 style="font-weight:800; margin-bottom:8px;">Rincian Transaksi</h6>
                <div style="max-height:340px; overflow-y:auto;">${riwayatHtml}</div>

                <button class="btn-utama" style="margin-top:16px; background:linear-gradient(135deg,#475569,#1e293b);" onclick="keluarDariAplikasi()"><i class="bi bi-box-arrow-right me-1"></i> Keluar</button>
                <button class="btn btn-link txt-muted mt-2 p-0 d-block text-center w-100" onclick="idNasabahAktif=''; tampilkanFormCek();">← Cek nomor lain</button>
            </div>
        `);
    }

    // ================== MULAI ==================
    window.onload = function() {
        setTimeout(() => { // beri jeda singkat supaya AdapterAPI (deferred script) pasti sudah termuat
            tampilkanFormCek();
        }, 50);
    };
</script>
</body>
</html>
