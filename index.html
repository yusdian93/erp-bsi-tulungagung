<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login - Sistem Bank Sampah Tulungagung</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body { 
            background: linear-gradient(135deg, #CBD5E1 0%, #94A3B8 100%); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid #CBD5E1;
            font-weight: 500;
        }

        .form-control:focus {
            border-color: #0284C7;
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0284C7, #0F172A);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 16px rgba(2, 132, 199, 0.25);
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(2, 132, 199, 0.35);
        }
        
        .input-group-text {
            border-radius: 12px 0 0 12px;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <img src="LOGO_DLH.png" alt="Logo DLH Tulungagung" style="height: 110px; margin-bottom: 20px; object-fit: contain;">
        
        <h4 style="font-weight: 800; color: #0F172A; letter-spacing: -0.5px; margin-bottom: 5px;">PORTAL TERPADU</h4>
        <p style="color: #475569; font-size: 0.9rem; font-weight: 600; margin-bottom: 30px; line-height: 1.4;">
            Sistem Informasi Manajemen<br>Bank Sampah Induk & Unit
        </p>

        <form id="formLogin" onsubmit="prosesLogin(event)">
            <div class="mb-3 text-start">
                <label style="font-weight: 700; color: #0F172A; font-size: 0.85rem; margin-bottom: 8px;">ID Pengguna / No. Registrasi BSU</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person-fill"></i></span>
                    <input type="text" id="username" class="form-control border-start-0 ps-0" placeholder="Cth: admin atau NSB-123..." required>
                </div>
            </div>

            <div class="mb-4 text-start">
                <label style="font-weight: 700; color: #0F172A; font-size: 0.85rem; margin-bottom: 8px;">Kata Sandi</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-key-fill"></i></span>
                    <input type="password" id="password" class="form-control border-start-0 ps-0" placeholder="Masukkan kata sandi..." required>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-primary w-100 text-white">MASUK SISTEM <i class="bi bi-box-arrow-in-right ms-2"></i></button>
        </form>
        
        <div class="mt-4" style="font-size: 0.75rem; color: #64748B; font-weight: 600;">
            &copy; 2026 Dinas Lingkungan Hidup Kab. Tulungagung
        </div>
    </div>

    <script>
        // Memakai URL Script Google Sheets milik Anda
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxyobiaV3dZFb7D8uEKFJYdFEe5ujxKtLGX-4UMnPpfE3IZOW64HjCMVh-83-6yLLVgag/exec';

        function prosesLogin(event) {
            event.preventDefault();
            
            let user = document.getElementById('username').value.trim();
            let pass = document.getElementById('password').value.trim();
            let btnSubmit = document.getElementById('btnSubmit');

            // ==========================================
            // LOGIKA 1: LOGIN ADMIN INDUK (STATIS / TETAP)
            // ==========================================
            // Untuk Admin Pusat, sengaja dipisah dan tidak pakai Google Sheets agar selalu bisa masuk meski sistem sedang gangguan
            if (user === 'admin') { 
                if (pass === 'admin123') { // Anda bisa mengganti password ini kapan saja
                    localStorage.setItem('ROLE_PENGGUNA', 'BSI');
                    localStorage.setItem('ID_UNIT_PENGGUNA', 'PUSAT');
                    window.location.href = 'induk.html';
                } else {
                    alert('Akses Ditolak: Kata Sandi Admin salah!');
                }
                return; // Hentikan script agar tidak lanjut mengecek ke Google Sheets
            }

            // ==========================================
            // LOGIKA 2: LOGIN BSU (CEK KE GOOGLE SHEETS)
            // ==========================================
            
            // Ubah efek visual tombol menjadi "Loading" saat proses ngecek ke server
            let originalText = btnSubmit.innerHTML;
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Memeriksa Database...';

            // Menarik data nasabah dari Google Sheets
            fetch(scriptURL + "?role=BSI&id_unit=") 
                .then(response => response.json())
                .then(data => {
                    let dataNasabah = data.nasabah || [];
                    
                    // Mencari apakah ID (No. Reg BSU) yang diketik itu ada di database
                    let bsuDitemukan = dataNasabah.find(n => String(n.id) === user);

                    if (bsuDitemukan) {
                        // Jika BSU ditemukan, cek apakah kata sandinya cocok
                        if (String(bsuDitemukan.password) === pass) {
                            
                            // Jika cocok, simpan data sesi BSU tersebut ke dalam browser
                            localStorage.setItem('ROLE_PENGGUNA', 'BSU');
                            localStorage.setItem('ID_UNIT_PENGGUNA', bsuDitemukan.id);
                            localStorage.setItem('NAMA_UNIT_PENGGUNA', bsuDitemukan.nama);
                            
                            // Lompat ke Halaman Cabang Unit
                            window.location.href = 'unit.html';
                            
                        } else {
                            alert('Akses Ditolak: Kata Sandi untuk BSU tersebut salah!');
                        }
                    } else {
                        alert('Akses Ditolak: ID / Nomor Registrasi BSU tidak terdaftar!');
                    }
                })
                .catch(error => {
                    alert('Gagal terhubung ke Server. Pastikan koneksi internet aktif.');
                })
                .finally(() => {
                    // Setelah selesai mengecek, kembalikan tombol seperti semula
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = originalText;
                });
        }
    </script>
</body>
</html>
