<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login - Sistem Bank Sampah Tulungagung</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="supabase-adapter.js" defer></script>

    <style>
        body { 
            background: linear-gradient(135deg, #CBD5E1 0%, #94A3B8 100%); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .form-control {
            border-radius: 12px;
            padding: 14px 18px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 1px solid #CBD5E1;
            font-weight: 500;
        }

        .form-control:focus {
            border-color: #0284C7;
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0284C7, #0F172A);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 16px rgba(2, 132, 199, 0.25);
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(2, 132, 199, 0.35);
        }
        
        .input-group-text {
            border-radius: 12px 0 0 12px;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <img src="logo_dlh.png" alt="Logo DLH Tulungagung" style="height: 110px; margin-bottom: 20px; object-fit: contain;" onerror="this.onerror=null; this.src='LOGO_DLH.png';">
        
        <h4 style="font-weight: 800; color: #0F172A; letter-spacing: -0.5px; margin-bottom: 5px;">PORTAL TERPADU</h4>
        <p style="color: #475569; font-size: 0.9rem; font-weight: 600; margin-bottom: 30px; line-height: 1.4;">
            Sistem Informasi Manajemen<br>Bank Sampah Induk & Unit
        </p>

        <form id="formLogin" onsubmit="prosesLogin(event)">
            <div class="mb-3 text-start">
                <label style="font-weight: 700; color: #0F172A; font-size: 0.85rem; margin-bottom: 8px;">ID Pengguna / No. Registrasi BSU</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person-fill"></i></span>
                    <input type="text" id="username" class="form-control border-start-0 ps-0" placeholder="Cth: admin atau BSU-123..." required>
                </div>
            </div>

            <div class="mb-4 text-start">
                <label style="font-weight: 700; color: #0F172A; font-size: 0.85rem; margin-bottom: 8px;">Kata Sandi</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-key-fill"></i></span>
                    <input type="password" id="password" class="form-control border-start-0 border-end-0 ps-0" placeholder="Masukkan kata sandi..." required>
                    <span class="input-group-text bg-white border-start-0 text-muted" onclick="lihatSandi('password', 'iconMataLogin')" style="cursor: pointer;">
                        <i class="bi bi-eye-slash-fill" id="iconMataLogin"></i>
                    </span>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-primary w-100 text-white">MASUK SISTEM <i class="bi bi-box-arrow-in-right ms-2"></i></button>
        </form>
        
        <div class="mt-4" style="font-size: 0.75rem; color: #64748B; font-weight: 600;">
            &copy; 2026 Dinas Lingkungan Hidup Kab. Tulungagung
        </div>
    </div>

    <script>
        function lihatSandi(inputId, iconId) {
            let input = document.getElementById(inputId);
            let icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye-slash-fill");
                icon.classList.add("bi-eye-fill"); 
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye-fill");
                icon.classList.add("bi-eye-slash-fill"); 
            }
        }        

        function prosesLogin(event) {
            event.preventDefault();
            
            let user = document.getElementById('username').value.trim();
            let pass = document.getElementById('password').value.trim();
            let btnSubmit = document.getElementById('btnSubmit');

            let originalText = btnSubmit.innerHTML;
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Memeriksa Database...';

            AdapterAPI.loginServer(user, pass)
                .then(data => {
                    if (data.ok) {
                        localStorage.setItem('ROLE_PENGGUNA', data.role);
                        localStorage.setItem('ID_UNIT_PENGGUNA', data.id_unit);
                        if (data.role === 'BSU') localStorage.setItem('NAMA_UNIT_PENGGUNA', data.nama);
                        window.location.href = data.role === 'BSI' ? 'induk.html' : 'unit.html';
                    } else {
                        alert('Akses Ditolak: ' + (data.error || 'Login gagal.'));
                    }
                })
                .catch(error => {
                    console.error("Terjadi Kesalahan:", error);
                    alert('Gagal terhubung ke Server Database. Pastikan Apps Script sudah di-deploy.');
                })
                .finally(() => {
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = originalText;
                });
        }
    </script>
</body>
</html>
