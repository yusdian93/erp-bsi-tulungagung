<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Saldo Tabungan Sampah</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="supabase-adapter.js" defer></script>

    <style>
        body {
            background: linear-gradient(135deg, #CBD5E1 0%, #94A3B8 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .wrap { max-width: 480px; margin: 0 auto; }
        .card-utama {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 28px 24px;
            margin-bottom: 20px;
        }
        .form-control { border-radius: 12px; padding: 13px 16px; border: 1px solid #CBD5E1; font-weight: 500; }
        .form-control:focus { border-color: #0284C7; box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.15); }
        .btn-utama {
            background: linear-gradient(135deg, #0284C7, #0F172A); border: none; border-radius: 12px;
            padding: 14px; font-weight: 700; color: #fff; width: 100%; letter-spacing: 0.3px;
        }
        .btn-utama:disabled { opacity: 0.6; }
        .saldo-besar { font-size: 2rem; font-weight: 800; color: #065f46; }
        .kartu-saldo { background: linear-gradient(135deg, #10b981, #065f46); border-radius: 18px; padding: 22px; color: #fff; text-align: center; margin-bottom: 18px; }
        .kartu-saldo .saldo-besar { color: #fff; }
        .riwayat-item { display:flex; justify-content:space-between; align-items:center; padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 13.5px; }
        .riwayat-item:last-child { border-bottom: none; }
        .badge-jenis { background:#e0f2fe; color:#075985; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700; }
        .badge-tarik { background:#fee2e2; color:#991b1b; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700; }
        .pilih-nasabah-btn { text-align:left; width:100%; padding:14px; border-radius:12px; border:1px solid #CBD5E1; background:#fff; margin-bottom:10px; font-weight:700; }
        .pilih-nasabah-btn:hover { border-color:#0284C7; background:#f0f9ff; }
        .txt-muted { color:#64748B; font-size: 12.5px; }
        .error-box { background:#fef2f2; border:1px solid #fca5a5; color:#991b1b; border-radius:12px; padding:12px 14px; font-size:13.5px; margin-top:12px; }
    </style>
</head>
<body>
<div class="wrap">

    <div class="text-center mb-3" style="padding-top:10px;">
        <img src="logo_dlh.png" alt="Logo DLH" style="height:70px; object-fit:contain;" onerror="this.style.display='none';">
        <h5 style="font-weight:800; color:#0F172A; margin-top:8px; margin-bottom:0;">CEK SALDO TABUNGAN SAMPAH</h5>
        <p class="txt-muted" style="margin-top:2px;">Bank Sampah Kab. Tulungagung</p>
    </div>

    <div id="areaUtama"></div>

    <p class="text-center txt-muted" style="margin-top:10px;">
        &copy; 2026 Dinas Lingkungan Hidup Kab. Tulungagung
    </p>
</div>

<script>
    // ================== STATE & UTIL ==================
    const params = new URLSearchParams(window.location.search);
    let idUnitAktif = params.get('unit') || '';
    let idNasabahAktif = params.get('nasabah') || '';
    let hasilPencarianSaatIni = null; // dipakai saat ada >1 nasabah cocok (HP sama)

    function rp(v) { return 'Rp ' + Math.round(v || 0).toLocaleString('id-ID'); }
    function formatTgl(t) {
        let d = new Date(t);
        if (isNaN(d.getTime())) return t;
        return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function samarkanNama(nama) {
        if (!nama) return '-';
        return nama.split(' ').map(kata => kata.length <= 2 ? kata : kata.slice(0, 2) + '*'.repeat(Math.max(1, kata.length - 2))).join(' ');
    }
    function tampilkan(html) { document.getElementById('areaUtama').innerHTML = html; }
    function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ================== LAYAR: MEMUAT ==================
    function layarMemuat(pesan) {
        tampilkan(`<div class="card-utama text-center"><div class="spinner-border text-primary mb-2"></div><p class="txt-muted mb-0">${pesan || 'Memuat...'}</p></div>`);
    }

    // ================== LAYAR: FORM CEK SALDO (mode Unit / mode Personal) ==================
    async function tampilkanFormCek() {
        if (!idUnitAktif) return tampilkanModeManual();

        layarMemuat('Memuat info Bank Sampah Unit...');
        let unit = await AdapterAPI.getInfoUnitPublik(idUnitAktif);
        if (!unit) {
            tampilkan(`<div class="card-utama"><div class="error-box">Bank Sampah Unit tidak ditemukan. Coba scan ulang QR-nya, atau hubungi petugas unit Anda.</div>
                <button class="btn btn-link mt-2 p-0" onclick="tampilkanModeManual()">Pilih unit secara manual</button></div>`);
            return;
        }

        let infoNasabah = null;
        if (idNasabahAktif) {
            infoNasabah = await AdapterAPI.getInfoNasabahRingkas(idUnitAktif, idNasabahAktif);
        }

        let judulKonteks = infoNasabah
            ? `Halo, <b>${esc(samarkanNama(infoNasabah.nama))}</b>!<br><span class="txt-muted">Bank Sampah Unit: ${esc(unit.nama)}</span>`
            : `<span class="txt-muted">Bank Sampah Unit</span><br><b style="font-size:1.15rem;">${esc(unit.nama)}</b>`;

        tampilkan(`
            <div class="card-utama">
                <p style="line-height:1.5;">${judulKonteks}</p>
                <p class="txt-muted" style="margin-bottom:14px;">
                    Masukkan nomor HP Anda yang terdaftar di Bank Sampah Unit ini untuk melihat saldo &amp; rincian tabungan sampah.
                </p>
                <div class="mb-3">
                    <input type="tel" id="inputHp" class="form-control" placeholder="Contoh: 081234567890" inputmode="numeric">
                </div>
                <button class="btn-utama" id="btnCek" onclick="prosesCekSaldo()">🔍 CEK SALDO SAYA</button>
                <div id="areaError"></div>
                ${!idNasabahAktif ? '' : `<button class="btn btn-link txt-muted mt-2 p-0" onclick="idNasabahAktif=''; idUnitAktif='${esc(idUnitAktif)}'; tampilkanFormCek();">Bukan Anda? Cek dengan cara lain</button>`}
            </div>
        `);
        document.getElementById('inputHp').addEventListener('keydown', (e) => { if (e.key === 'Enter') prosesCekSaldo(); });
        document.getElementById('inputHp').focus();
    }

    // ================== LAYAR: MODE MANUAL (tanpa parameter URL sama sekali) ==================
    async function tampilkanModeManual() {
        layarMemuat('Memuat daftar Bank Sampah Unit...');
        let daftar = await AdapterAPI.getDaftarUnitPublik();
        let opsi = daftar.map(u => `<option value="${esc(u.id)}">${esc(u.nama)}</option>`).join('');
        tampilkan(`
            <div class="card-utama">
                <p class="mb-2"><i class="bi bi-qr-code-scan"></i> Biasanya halaman ini dibuka lewat scan QR yang dipasang di lokasi Bank Sampah Unit.
                Kalau Anda membuka langsung tanpa scan, silakan pilih unit Anda secara manual:</p>
                <div class="mb-3">
                    <label class="txt-muted mb-1 d-block">Bank Sampah Unit</label>
                    <select id="pilihUnitManual" class="form-control">
                        <option value="">-- Pilih Bank Sampah Unit --</option>
                        ${opsi}
                    </select>
                </div>
                <div class="mb-3">
                    <input type="tel" id="inputHpManual" class="form-control" placeholder="Nomor HP terdaftar" inputmode="numeric">
                </div>
                <button class="btn-utama" onclick="prosesCekSaldoManual()">🔍 CEK SALDO SAYA</button>
                <div id="areaError"></div>
            </div>
        `);
    }

    function prosesCekSaldoManual() {
        let unit = document.getElementById('pilihUnitManual').value;
        let hp = document.getElementById('inputHpManual').value;
        if (!unit) return tampilkanError('Pilih Bank Sampah Unit terlebih dahulu.');
        idUnitAktif = unit;
        jalankanPencarian(hp);
    }

    function prosesCekSaldo() {
        let hp = document.getElementById('inputHp').value;
        jalankanPencarian(hp);
    }

    function tampilkanError(pesan) {
        let el = document.getElementById('areaError');
        if (el) el.innerHTML = `<div class="error-box">${esc(pesan)}</div>`;
    }

    // ================== PROSES PENCARIAN ==================
    async function jalankanPencarian(nomorHp) {
        nomorHp = (nomorHp || '').trim();
        if (!nomorHp) return tampilkanError('Nomor HP wajib diisi.');

        let btn = document.getElementById('btnCek');
        if (btn) { btn.disabled = true; btn.innerText = 'Mencari...'; }

        try {
            let res = await AdapterAPI.cekSaldoNasabahPublik({ idUnit: idUnitAktif, nomorHp: nomorHp, idNasabah: idNasabahAktif || null });
            if (!res.ok) { tampilkanError(res.error); return; }

            hasilPencarianSaatIni = res;
            if (res.data.length === 1) {
                tampilkanHasil(res.unit, res.data[0]);
            } else {
                tampilkanPilihNasabah(res.unit, res.data);
            }
        } catch (e) {
            tampilkanError('Terjadi kesalahan: ' + e);
        } finally {
            if (btn) { btn.disabled = false; btn.innerText = '🔍 CEK SALDO SAYA'; }
        }
    }

    // Kalau satu nomor HP terdaftar untuk lebih dari satu nasabah (mis. satu keluarga)
    function tampilkanPilihNasabah(unit, daftar) {
        let opsi = daftar.map((d, i) => `<button class="pilih-nasabah-btn" onclick="tampilkanHasilDariIndex(${i})">👤 ${esc(samarkanNama(d.nasabah.nama))}</button>`).join('');
        tampilkan(`
            <div class="card-utama">
                <p class="mb-3">Nomor HP ini terdaftar untuk <b>${daftar.length} nasabah</b> di ${esc(unit ? unit.nama : '')}. Pilih nama Anda:</p>
                ${opsi}
                <button class="btn btn-link txt-muted mt-1 p-0" onclick="tampilkanFormCek()">← Kembali</button>
            </div>
        `);
    }
    function tampilkanHasilDariIndex(i) {
        tampilkanHasil(hasilPencarianSaatIni.unit, hasilPencarianSaatIni.data[i]);
    }

    // ================== LAYAR: HASIL SALDO ==================
    function tampilkanHasil(unit, d) {
        let riwayatHtml = d.riwayat.length
            ? d.riwayat.map(t => {
                let nilai = parseFloat(t.total) || 0;
                let tarik = nilai < 0;
                return `<div class="riwayat-item">
                    <div>
                        <div>${tarik ? '<span class="badge-tarik">PENARIKAN</span>' : `<span class="badge-jenis">${esc(t.jenis || 'Setoran')}</span>`}</div>
                        <div class="txt-muted" style="margin-top:3px;">${formatTgl(t.tgl)} ${!tarik && t.berat ? '· ' + parseFloat(t.berat).toLocaleString('id-ID') + ' Kg' : ''}</div>
                    </div>
                    <div style="font-weight:800; color:${tarik ? '#991b1b' : '#166534'};">${tarik ? '-' : '+'}${rp(Math.abs(nilai))}</div>
                </div>`;
            }).join('')
            : '<p class="txt-muted text-center py-3 mb-0">Belum ada riwayat transaksi.</p>';

        tampilkan(`
            <div class="card-utama">
                <p class="txt-muted mb-1">${esc(unit ? unit.nama : '')}</p>
                <h5 style="font-weight:800; margin-bottom:16px;">👤 ${esc(d.nasabah.nama)}</h5>

                <div class="kartu-saldo">
                    <div style="font-size:12.5px; opacity:0.9; margin-bottom:4px;">SALDO TABUNGAN SAAT INI</div>
                    <div class="saldo-besar">${rp(d.saldo)}</div>
                    <div style="font-size:12px; opacity:0.9; margin-top:6px;">Total sampah tertabung: ${(d.totalBeratSetor || 0).toLocaleString('id-ID')} Kg</div>
                </div>

                <h6 style="font-weight:800; margin-bottom:8px;">Rincian Transaksi</h6>
                <div style="max-height:340px; overflow-y:auto;">${riwayatHtml}</div>

                <button class="btn btn-link txt-muted mt-3 p-0" onclick="idNasabahAktif=''; tampilkanFormCek();">← Cek nomor lain</button>
            </div>
        `);
    }

    // ================== MULAI ==================
    window.onload = function() {
        setTimeout(() => { // beri jeda singkat supaya AdapterAPI (deferred script) pasti sudah termuat
            tampilkanFormCek();
        }, 50);
    };
</script>
</body>
</html>
